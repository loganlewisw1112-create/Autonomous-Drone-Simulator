name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npx eslint src

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build

      # COORDINATOR_BUILD_PLAN §7: prove on the ARTIFACT, not the source, that the shipping
      # mobile/Windows bundles carry no networking code and that the classroom build still
      # ships its relay client. Builds both ways, so it runs after (and replaces) nothing above.
      - name: Assert bundle isolation
        run: npm run assert:bundles

      - name: Audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Coverage (report-only)
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        # Non-fatal: account artifact-storage quota can reject uploads; coverage is
        # report-only and must never fail the verify gate.
        continue-on-error: true
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
